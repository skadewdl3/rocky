name: Rebuild website
on: [push]

jobs:
  build_slides:
    if: ${{ secrets.CLOUDFLARE_WEBHOOK_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.71.0
          cache: true

      - name: Generate slides
        run: pixi run generate

      - name: Push CF webhook
        run: curl -d "" ${secrets.CLOUDFLARE_WEBHOOK_URL}
        
